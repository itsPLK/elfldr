name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build via Docker
        run: bash ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elfldr-ps5
          path: elfldr-ps5.elf
